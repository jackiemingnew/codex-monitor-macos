name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Sign, notarize, and publish
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Check out the release tag
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate release tag and secrets
        shell: bash
        env:
          DEVELOPER_ID_CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_BASE64 }}
          DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          APPLE_API_PRIVATE_KEY_BASE64: ${{ secrets.APPLE_API_PRIVATE_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          version="$(tr -d '[:space:]' < VERSION)"
          [[ "$GITHUB_REF_NAME" == "v$version" ]] || {
            echo "Tag $GITHUB_REF_NAME does not match VERSION=$version" >&2
            exit 1
          }
          for name in \
            DEVELOPER_ID_CERTIFICATE_BASE64 \
            DEVELOPER_ID_CERTIFICATE_PASSWORD \
            APPLE_API_PRIVATE_KEY_BASE64 \
            APPLE_API_KEY_ID \
            APPLE_API_ISSUER_ID; do
            [[ -n "${!name:-}" ]] || {
              echo "Missing required GitHub Actions secret: $name" >&2
              exit 1
            }
          done
          [[ "$(git cat-file -t "$GITHUB_REF_NAME")" == "tag" ]] || {
            echo "Release tags must be annotated" >&2
            exit 1
          }
          git fetch origin main
          release_commit="$(git rev-list -n 1 "$GITHUB_REF_NAME")"
          git merge-base --is-ancestor "$release_commit" origin/main || {
            echo "Release tag must point to a commit contained in main" >&2
            exit 1
          }

      - name: Import Developer ID certificate
        shell: bash
        env:
          DEVELOPER_ID_CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_BASE64 }}
          DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          certificate_path="$RUNNER_TEMP/developer-id.p12"
          keychain_path="$RUNNER_TEMP/release-signing.keychain-db"
          keychain_password="$(openssl rand -hex 24)"
          printf '%s' "$DEVELOPER_ID_CERTIFICATE_BASE64" | base64 --decode > "$certificate_path"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" \
            -k "$keychain_path" \
            -P "$DEVELOPER_ID_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "$keychain_password" \
            "$keychain_path"
          security list-keychains -d user -s "$keychain_path"
          identity="$(security find-identity -v -p codesigning "$keychain_path" | awk -F'"' '/Developer ID Application/{print $2; exit}')"
          [[ -n "$identity" ]] || {
            echo "Developer ID Application identity was not found" >&2
            exit 1
          }
          echo "CODE_SIGN_IDENTITY=$identity" >> "$GITHUB_ENV"
          echo "RELEASE_KEYCHAIN_PATH=$keychain_path" >> "$GITHUB_ENV"
          echo "RELEASE_CERTIFICATE_PATH=$certificate_path" >> "$GITHUB_ENV"

      - name: Prepare App Store Connect API key
        shell: bash
        env:
          APPLE_API_PRIVATE_KEY_BASE64: ${{ secrets.APPLE_API_PRIVATE_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          set -euo pipefail
          key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "$APPLE_API_PRIVATE_KEY_BASE64" | base64 --decode > "$key_path"
          chmod 600 "$key_path"
          echo "APPLE_API_PRIVATE_KEY_PATH=$key_path" >> "$GITHUB_ENV"

      - name: Build and verify signed DMGs
        env:
          APP_BUILD_NUMBER: ${{ github.run_number }}
        run: ./scripts/run-clean-package-checks.sh

      - name: Notarize and staple DMGs
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: ./scripts/notarize-release.sh

      - name: Upload notarized release artifacts
        uses: actions/upload-artifact@v5
        with:
          name: codex-monitor-release-${{ github.ref_name }}
          path: |
            dist/codex-monitor-*.dmg
            dist/SHA256SUMS
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/codex-monitor-*.dmg \
            dist/SHA256SUMS \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --generate-notes \
            --title "Codex Monitor $GITHUB_REF_NAME"

      - name: Remove temporary signing material
        if: always()
        shell: bash
        run: |
          if [[ -n "${RELEASE_KEYCHAIN_PATH:-}" && -f "$RELEASE_KEYCHAIN_PATH" ]]; then
            security delete-keychain "$RELEASE_KEYCHAIN_PATH" || true
          fi
          for path in "${RELEASE_CERTIFICATE_PATH:-}" "${APPLE_API_PRIVATE_KEY_PATH:-}"; do
            [[ -z "$path" ]] || rm -f "$path"
          done
